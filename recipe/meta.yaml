{% set name = "qa-noarch-test" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ../src

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python

test:
  imports:
    - qa_noarch_test
  commands:
    - python -c "from qa_noarch_test import main; main()"

about:
  summary: "Dummy noarch test package"
  license: MIT